<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload SWF</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    input, button { margin:10px; padding:10px; }
  </style>
</head>
<body>
  <h2>Upload SWF File</h2>
  <input type="file" id="fileInput" accept=".swf" />
  <br/>
  <button onclick="uploadFile()">Upload</button>
  <br/><br/>
  <a href="index.html">Back Home</a>

  <script>
    function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];
      if (!file) return alert("Select a file");

      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;

        let games = JSON.parse(localStorage.getItem("swfFiles") || "[]");
        games.push({ name: file.name, data: dataUrl });
        localStorage.setItem("swfFiles", JSON.stringify(games));

        alert("Uploaded successfully!");
        window.location.href = "index.html";
      };
      reader.readAsDataURL(file);
    }
  </script>
</html>
