<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWF Player</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
  body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  #dropZone {
    border: 2px dashed #38bdf8;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
    margin-bottom: 20px;
  }

  /* Center the player */
  #playerWrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 600px;
  }

  #player {
    width: 800px;
    height: 600px;
    background: black;
    border-radius: 10px;
    overflow: hidden;
  }

  input {
    margin-top: 10px;
  }
</style>
</head>
<body>

  <div id="dropZone">
    <p>Drag & Drop SWF here</p>
    <p>or</p>
    <input type="file" id="fileInput" accept=".swf" />
  </div>

  <div id="player"></div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");

     function loadSWF(file) {
    const url = URL.createObjectURL(file);

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    const container = document.getElementById("player");
    container.innerHTML = "";
    container.appendChild(player);

    // Load the SWF
    player.load(url);

    // Wait for metadata to get dimensions
    player.addEventListener("loadedmetadata", () => {
      const width = player.metadata.width;
      const height = player.metadata.height;

      if (width && height) {
        // Resize player to match SWF size
        player.style.width = width + "px";
        player.style.height = height + "px";
      }
    });
  }
    // File input
    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) loadSWF(file);
    });

    // Drag & drop
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.style.borderColor = "#22d3ee";
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.style.borderColor = "#38bdf8";
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.style.borderColor = "#38bdf8";

      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith(".swf")) {
        loadSWF(file);
      } else {
        alert("Please drop a valid .swf file");
      }
    });
  </script>

</body>
</html>
