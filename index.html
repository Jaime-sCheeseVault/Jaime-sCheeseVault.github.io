<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWF Library</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    header {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    a {
      color:#38bdf8;
      text-decoration:none;
      margin-left:10px;
    }

    .container {
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap:15px;
      margin-top:10px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .filename {
      word-break: break-word;
      margin-bottom:10px;
    }

    button {
      margin-top:10px;
      padding:8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .download {
      background:#22c55e;
      color:black;
    }

    .hint {
      color:#94a3b8;
      font-size:14px;
    }

    h3 {
      margin-bottom:5px;
    }
  </style>
</head>

<body>

<header>
  <h2>SWF Library</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="upload.html">Upload</a>
  </div>
</header>

<!-- GitHub Games -->
<div class="container">
  <h3>Games from GitHub</h3>
  <p class="hint">Click download to save SWF files.</p>
  <div id="games" class="grid"></div>
</div>

<!-- Quick Download Section -->
<div class="container">
  <h3>Quick Download SWFs</h3>
  <p class="hint">Auto-loaded from GitHub repository.</p>
  <div id="manualGames" class="grid"></div>
</div>

<script>
  const repoAPI = "https://api.github.com/repos/Jaime-sCheeseVault/swf-games/contents/";
  const gamesContainer = document.getElementById("games");
  const manualContainer = document.getElementById("manualGames");

  async function loadGames() {
    try {
      const res = await fetch(repoAPI);
      const files = await res.json();

      const swfFiles = files.filter(file => file.name.endsWith(".swf"));

      // =========================
      // Section 1: GitHub Games
      // =========================
      if (swfFiles.length === 0) {
        gamesContainer.innerHTML = "No SWF files found.";
      } else {
        swfFiles.forEach(file => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <div class="filename">${file.name}</div>
            <button class="download">Download</button>
          `;

          card.querySelector(".download").onclick = () => {
            const a = document.createElement("a");
            a.href = file.download_url;
            a.download = file.name;
            a.click();
          };

          gamesContainer.appendChild(card);
        });
      }

      // =========================
      // Section 2: Quick Downloads (20 slots)
      // =========================

      // Take up to 20 SWFs from repo
      const limitedFiles = swfFiles.slice(0, 20);

      limitedFiles.forEach(file => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="filename">${file.name}</div>
          <button class="download">Download</button>
        `;

        card.querySelector(".download").onclick = () => {
          const a = document.createElement("a");
          a.href = file.download_url;
          a.download = file.name;
          a.click();
        };

        manualContainer.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      gamesContainer.innerHTML = "Failed to load games.";
    }
  }

  loadGames();
</script>

</body>
</html>
