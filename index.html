<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWF Library</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    header {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    a {
      color:#38bdf8;
      text-decoration:none;
      margin-left:10px;
    }

    .container {
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .filename {
      word-break: break-word;
      margin-bottom:10px;
    }

    button {
      margin-top:10px;
      padding:8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .download {
      background:#22c55e;
      color:black;
    }

    .hint {
      color:#94a3b8;
      font-size:14px;
    }
  </style>
</head>
<body>

<header>
  <h2>SWF Library</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="upload.html">Upload</a>
  </div>
</header>

<!-- GitHub Games -->
<div class="container">
  <h3>Games from GitHub</h3>
  <p class="hint">Click download to save SWF files.</p>
  <div id="games" class="grid"></div>
</div>

<!-- Manual Buttons -->
<div class="container">
  <h3>Quick Download SWFs</h3>
  <div id="manualGames" class="grid"></div>
</div>

<script>
  // =========================
  // GitHub SWF Loader
  // =========================
  const repoAPI = "https://api.github.com/repos/Jaime-sCheeseVault/swf-games/contents/";
  const gamesContainer = document.getElementById("games");

  async function loadGames() {
    try {
      const res = await fetch(repoAPI);
      const files = await res.json();

      const swfFiles = files.filter(file => file.name.endsWith(".swf"));

      if (swfFiles.length === 0) {
        gamesContainer.innerHTML = "No SWF files found.";
        return;
      }

      swfFiles.forEach(file => {
        const rawURL = file.download_url;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="filename">${file.name}</div>
          <button class="download">Download</button>
        `;

        card.querySelector(".download").onclick = () => {
          const a = document.createElement("a");
          a.href = rawURL;
          a.download = file.name;
          a.click();
        };

        gamesContainer.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      gamesContainer.innerHTML = "Failed to load games.";
    }
  }

  loadGames();

  // =========================
  // Manual SWF Buttons (20 slots)
  // =========================
  const manualContainer = document.getElementById("manualGames");

  const swfLinks = [
    { name: "Game 1", url: "" },
    { name: "Game 2", url: "" },
    { name: "Game 3", url: "" },
    { name: "Game 4", url: "" },
    { name: "Game 5", url: "" },
    { name: "Game 6", url: "" },
    { name: "Game 7", url: "" },
    { name: "Game 8", url: "" },
    { name: "Game 9", url: "" },
    { name: "Game 10", url: "" },
    { name: "Game 11", url: "" },
    { name: "Game 12", url: "" },
    { name: "Game 13", url: "" },
    { name: "Game 14", url: "" },
    { name: "Game 15", url: "" },
    { name: "Game 16", url: "" },
    { name: "Game 17", url: "" },
    { name: "Game 18", url: "" },
    { name: "Game 19", url: "" },
    { name: "Game 20", url: "" }
  ];

  swfLinks.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="filename">${game.name}</div>
      <button class="download">Download</button>
    `;

    card.querySelector(".download").onclick = () => {
      if (!game.url) {
        alert("No SWF link assigned yet.");
        return;
      }

      const a = document.createElement("a");
      a.href = game.url;
      a.download = game.name + ".swf";
      a.click();
    };

    manualContainer.appendChild(card);
  });
</script>

</body>
</html>
