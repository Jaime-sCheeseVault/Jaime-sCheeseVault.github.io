<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWF Library</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; margin:0; }
    header { padding:20px; background:#020617; display:flex; justify-content:space-between; align-items:center; }
    a { color:#38bdf8; text-decoration:none; margin-right:15px; }
    .container { padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:15px; }
    .card { background:#1e293b; padding:15px; border-radius:10px; cursor:pointer; transition:0.2s; }
    .card:hover { transform:scale(1.03); }
  </style>
</head>
<body>
  <header>
    <h2>SWF Library</h2>
    <nav>
      <a href="index.html">Home</a>
      <a href="upload.html">Upload</a>
    </nav>
  </header>

  <div class="container">
    <h3>Available Games</h3>
    <div id="games" class="grid"></div>
  </div>

  <script>
    // Load saved SWF files from localStorage
    const gamesContainer = document.getElementById("games");
    const games = JSON.parse(localStorage.getItem("swfFiles") || "[]");

    games.forEach(game => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = game.name;
      div.onclick = () => {
        window.location.href = `play.html?src=${encodeURIComponent(game.data)}`;
      };
      gamesContainer.appendChild(div);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload SWF</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
    input, button { margin:10px; padding:10px; }
  </style>
</head>
<body>
  <h2>Upload SWF File</h2>
  <input type="file" id="fileInput" accept=".swf" />
  <br/>
  <button onclick="uploadFile()">Upload</button>
  <br/><br/>
  <a href="index.html">Back Home</a>

  <script>
    function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];
      if (!file) return alert("Select a file");

      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;

        let games = JSON.parse(localStorage.getItem("swfFiles") || "[]");
        games.push({ name: file.name, data: dataUrl });
        localStorage.setItem("swfFiles", JSON.stringify(games));

        alert("Uploaded successfully!");
        window.location.href = "index.html";
      };
      reader.readAsDataURL(file);
    }
  </script>
</html>
