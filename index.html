<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWF Library</title>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    header {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    a {
      color:#38bdf8;
      text-decoration:none;
      margin-left:10px;
    }

    .container {
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap:15px;
      margin-top:10px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .filename {
      word-break: break-word;
      margin-bottom:10px;
    }

    button {
      margin-top:10px;
      padding:8px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .download {
      background:#22c55e;
      color:black;
    }
  </style>
</head>

<body>

<header>
  <h2>SWF Library</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="upload.html">Upload</a>
  </div>
</header>

<!-- Quick Download Section Only -->
<div class="container">
  <h3>Quick Download SWFs</h3>
  <div id="manualGames" class="grid"></div>
</div>

<script>
  const repoAPI = "https://api.github.com/repos/Jaime-sCheeseVault/swf-games/contents/";
  const manualContainer = document.getElementById("manualGames");

  async function loadGames() {
    try {
      const res = await fetch(repoAPI);
      const files = await res.json();

      const swfFiles = files.filter(file => file.name.endsWith(".swf"));

      // Render up to 20 SWF buttons
      for (let i = 0; i < Math.min(20, swfFiles.length); i++) {
        const file = swfFiles[i];

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="filename">${file.name}</div>
          <button class="download">Download</button>
        `;

        card.querySelector(".download").onclick = () => {
          const a = document.createElement("a");
          a.href = file.download_url;
          a.download = file.name;
          a.click();
        };

        manualContainer.appendChild(card);
      }

    } catch (err) {
      console.error(err);
      manualContainer.innerHTML = "Failed to load games.";
    }
  }

  loadGames();
</script>

</body>
</html>
