<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWF Library</title>

  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
    }

    header {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    a {
      color:#38bdf8;
      text-decoration:none;
      margin-left:10px;
    }

    .container {
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:10px;
    }

    button {
      margin-top:10px;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .play {
      background:#38bdf8;
      color:black;
    }

    .download {
      background:#22c55e;
      color:black;
    }

    /* Player */
    #playerWrapper {
      display:flex;
      justify-content:center;
      align-items:center;
      margin-top:20px;
    }

    #player {
      width:800px;
      height:600px;
      background:black;
      border-radius:10px;
      overflow:hidden;
    }
  </style>
</head>
<body>

<header>
  <h2>SWF Library</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="upload.html">Upload</a>
  </div>
</header>

<div class="container">
  <h3>Games from GitHub</h3>
  <div id="games" class="grid"></div>
</div>

<div class="container">
  <h3>Game Player</h3>
  <div id="playerWrapper">
    <div id="player"></div>
  </div>
</div>

<script>
  const repoAPI = "https://api.github.com/repos/Jaime-sCheeseVault/swf-games/contents/";
  const gamesContainer = document.getElementById("games");

  async function loadGames() {
    try {
      const res = await fetch(repoAPI);
      const files = await res.json();

      const swfFiles = files.filter(file => file.name.endsWith(".swf"));

      swfFiles.forEach(file => {
        const rawURL = file.download_url;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div>${file.name}</div>
          <button class="play">Play</button>
          <button class="download">Download</button>
        `;

        // Play in embedded player
        card.querySelector(".play").onclick = () => {
          const ruffle = window.RufflePlayer.newest();
          const player = ruffle.createPlayer();

          const container = document.getElementById("player");
          container.innerHTML = "";
          container.appendChild(player);

          player.load(rawURL);
        };

        // Download SWF
        card.querySelector(".download").onclick = () => {
          const a = document.createElement("a");
          a.href = rawURL;
          a.download = file.name;
          a.click();
        };

        gamesContainer.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      gamesContainer.innerHTML = "Failed to load games.";
    }
  }

  loadGames();
</script>

</body>
</html>
